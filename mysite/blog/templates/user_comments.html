{% extends 'base.html' %}

{% block title %}Mano komentarai{% endblock %}

{% block content %}
<h1>Mano komentarai</h1>

{% for comment in comments %}

<div class="d-flex">
    <div class="flex-shrink-0"><img class="rounded-circle" src="https://dummyimage.com/50x50/ced4da/6c757d.jpg" alt="..." /></div>
    <div class="ms-3">
        <div class="">Įrašas: <a href="{% url 'post' comment.post.pk %}">{{ comment.post.title }}</a></div>
        <div class="fw-bold">{{ comment.author }}, {{ comment.date_created | date:"Y-m-d H:i" }}</div>
        {{ comment.content | safe }}
    </div>
</div>

{% endfor%}

{% endblock %}
